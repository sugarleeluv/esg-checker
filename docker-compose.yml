services:
  postgres:
    image: postgres:16-alpine
    container_name: esg-checker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: esg
      POSTGRES_PASSWORD: esg_dev_password
      POSTGRES_DB: esg_checker
    ports:
      - "5432:5432"
    volumes:
      - esg_pg_data:/var/lib/postgresql/data

volumes:
  esg_pg_data:
